<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="simpleform.css">
</head>

<body>

    <body class="product">
        <form class="new" action="action.php" method="get">
            <h1>New Product</h1>
            <label for="name">Name</label><br>
            <input type="text" id="name"><br><br>
            <label for="price">Price</label><br>
            <input type="text" id="price"><br><br>
            <label for="date">Released on</label><br>
            <input type="number" min="1900" max="2100">
            <select name="month">
                <option>October</option>
                <option>November</option>
                <option>December</option>
            </select>
            <select name="day">
                <option>4</option>
                <option>5</option>
                <option>6</option>
            </select><br><br>
            <label for="category">Category</label><br>
            <select id="category" name="Category"><br>
                <option value="toys">Toys & Games</option><br>
                <option value="books">Books</option>
            </select><br><br>
            <label for="rating">Rating</label><br>
            <input type="number" id="rating" name="rating" min="1" max="5" value="1"><br><br>
            <label for="discontinued">Discontinued</label><br>
            <input type="checkbox" id="discontinued" name="discontinued"><br><br>
            <button type="submit">Create Product</button>
        </form>
    </body>

</html>
